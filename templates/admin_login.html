{% extends "base.html" %}
{% block title %}管理入口 - 角色卡平台{% endblock %}
{% block content %}
<section class="admin-login">
    <p class="eyebrow">Admin</p>
    <h1>管理入口</h1>
    <p>使用 admin 账号登录管理后台。</p>
    <p>首次启动时会自动生成 admin 账号，密码保存在 <code>role_card_platform/data/admin_token.txt</code>。</p>
    
    <form class="admin-token-form" method="post" action="{{ url_for('admin_login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
            <span>用户名</span>
            <input name="username" type="text" value="admin" readonly>
        </label>
        <label>
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password" placeholder="输入管理员密码" autofocus required>
        </label>
        <button type="submit">进入管理后台</button>
    </form>
</section>
{% endblock %}
